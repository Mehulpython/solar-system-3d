<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Solar System | Interactive 3D Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            background: #000;
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }

        #loading {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            transition: opacity 1.5s ease;
        }
        .spinner {
            width: 80px; height: 80px;
            border: 3px solid rgba(255,165,0,0.1);
            border-top-color: #ffa500;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p {
            margin-top: 24px; color: #667;
            letter-spacing: 4px; font-size: 13px; font-weight: 300;
        }
        #loading .err {
            color: #ff5555; font-size: 13px; margin-top: 12px;
            max-width: 400px; text-align: center; line-height: 1.5;
            display: none; letter-spacing: 0;
        }

        #header {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%); z-index: 10;
            text-align: center; pointer-events: none;
        }
        #header h1 {
            font-size: 18px; font-weight: 200;
            letter-spacing: 6px; text-transform: uppercase;
        }
        #header p {
            font-size: 10px; color: #445;
            letter-spacing: 3px; margin-top: 2px;
        }

        #info-panel {
            position: fixed; top: 20px; left: 20px;
            background: rgba(8, 12, 24, 0.82);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 0;
            max-width: 340px; width: 340px;
            opacity: 0; transform: translateX(-20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none; overflow: hidden;
        }
        #info-panel.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
        #info-panel .planet-header {
            padding: 20px 24px 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        #info-panel .planet-color-bar {
            height: 4px; border-radius: 2px;
            margin-bottom: 12px; width: 40px;
        }
        #info-panel h2 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
        #info-panel .subtitle {
            font-size: 12px; color: #7788aa;
            letter-spacing: 1px; text-transform: uppercase;
        }
        #info-panel .body { padding: 16px 24px 20px; }
        #info-panel .stat {
            display: flex; justify-content: space-between;
            padding: 5px 0; font-size: 14px;
        }
        #info-panel .stat-label { color: #7788aa; }
        #info-panel .stat-value { font-weight: 600; color: #ccd5e8; }
        #info-panel .desc {
            margin-top: 14px; padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
            font-size: 13px; line-height: 1.6; color: #99aabb;
        }
        #info-panel .fact {
            margin-top: 10px; padding: 10px 14px;
            background: rgba(255,165,0,0.08);
            border-left: 3px solid #ffa500;
            border-radius: 4px; font-size: 13px;
            line-height: 1.5; color: #ddc;
        }

        #planet-nav {
            position: fixed; top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 6px; z-index: 10;
        }
        .nav-btn {
            background: rgba(8, 12, 24, 0.82);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            color: #ccd5e8; padding: 8px 16px; border-radius: 10px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
            text-align: left; min-width: 120px;
            display: flex; align-items: center; gap: 10px;
        }
        .nav-btn:hover {
            background: rgba(255,165,0,0.1);
            border-color: rgba(255,165,0,0.25);
            transform: translateX(-3px);
        }
        .nav-btn.active {
            background: rgba(255,165,0,0.15);
            border-color: rgba(255,165,0,0.4);
        }
        .nav-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        #controls {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(8, 12, 24, 0.82);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 10px 22px;
            display: flex; align-items: center; gap: 24px; z-index: 10;
        }
        .ctrl-group { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #7788aa; }
        .ctrl-group label { white-space: nowrap; }
        #speed-slider {
            width: 120px; -webkit-appearance: none; appearance: none;
            height: 4px; border-radius: 2px;
            background: rgba(255,255,255,0.1); outline: none;
        }
        #speed-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px;
            border-radius: 50%; background: #ffa500; cursor: pointer;
        }
        #speed-slider::-moz-range-thumb {
            width: 14px; height: 14px; border: none;
            border-radius: 50%; background: #ffa500; cursor: pointer;
        }
        .toggle-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #8899bb; padding: 6px 14px; border-radius: 8px;
            cursor: pointer; font-size: 12px; transition: all 0.2s; white-space: nowrap;
        }
        .toggle-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
        .toggle-btn.on {
            background: rgba(255,165,0,0.12);
            border-color: rgba(255,165,0,0.3); color: #ffa500;
        }
        .planet-label {
            color: rgba(255,255,255,0.6); font-size: 11px; font-weight: 500;
            letter-spacing: 1px; text-transform: uppercase;
            pointer-events: none; text-shadow: 0 0 8px rgba(0,0,0,0.8);
            position: absolute; white-space: nowrap;
        }
        #hint {
            position: fixed; bottom: 75px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.25); font-size: 12px;
            pointer-events: none; z-index: 5;
            animation: hintFade 5s 3s forwards;
        }
        @keyframes hintFade { to { opacity: 0; } }
        @media (max-width: 768px) {
            #info-panel { max-width: calc(100vw - 40px); width: calc(100vw - 40px); top: auto; bottom: 80px; left: 20px; }
            #planet-nav { gap: 4px; }
            .nav-btn { min-width: auto; padding: 6px 10px; font-size: 11px; }
            #controls { flex-wrap: wrap; justify-content: center; gap: 12px; padding: 8px 16px; }
            #speed-slider { width: 80px; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text">LOADING SOLAR SYSTEM</p>
        <p class="err" id="loading-error"></p>
    </div>
    <div id="canvas-container"></div>
    <div id="header"><h1>Solar System</h1><p>Interactive 3D Explorer</p></div>

    <div id="info-panel">

        <div class="body">
            <div id="p-stats"></div>

            <div class="fact" id="p-fact"></div>

        <div class="ctrl-group">
            <label>Speed</label>
            <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">

        </div>
        <div class="ctrl-group">
            <button class="toggle-btn on" id="btn-orbits">Orbits</button>
            <button class="toggle-btn on" id="btn-labels">Labels</button>
            <button class="toggle-btn" id="btn-reset">Overview</button>
        </div>
    </div>

    // ========================================================
    //  TEXTURE GENERATORS
    // ========================================================
    function makeCanvas(w, h) {
        w = w || 1024; h = h || 512;
        var c = document.createElement('canvas');
        c.width = w; c.height = h;
        return { canvas: c, ctx: c.getContext('2d') };
    }
    function toTex(canvas) {
        var t = new THREE.CanvasTexture(canvas);
        if (t.encoding !== undefined) t.encoding = THREE.sRGBEncoding;
        if (t.colorSpace !== undefined) t.colorSpace = THREE.SRGBColorSpace;
        t.anisotropy = 8;
        return t;
    }
    function addNoise(ctx, w, h, amount) {
        try {
            var img = ctx.getImageData(0, 0, w, h);
            var d = img.data;
            for (var i = 0; i < d.length; i += 4) {
                var n = (Math.random() - 0.5) * amount;
                d[i] = Math.max(0, Math.min(255, d[i] + n));
                d[i+1] = Math.max(0, Math.min(255, d[i+1] + n));
                d[i+2] = Math.max(0, Math.min(255, d[i+2] + n));
            }
            ctx.putImageData(img, 0, 0);
        } catch(e) {}
    }

    function texMercury() {
        var mc = makeCanvas(), ctx = mc.ctx;
        var g = ctx.createLinearGradient(0,0,0,512);
        g.addColorStop(0,'#6b5a48'); g.addColorStop(0.5,'#8c7853'); g.addColorStop(1,'#5e4f3e');
        ctx.fillStyle=g; ctx.fillRect(0,0,1024,512);
        for(var i=0;i<8;i++){ctx.fillStyle='rgba(50,40,30,'+(0.15+Math.random()*0.15)+')';ctx.beginPath();ctx.arc(Math.random()*1024,Math.random()*512,60+Math.random()*80,0,Math.PI*2);ctx.fill();}
        for(i=0;i<600;i++){var x=Math.random()*1024,y=Math.random()*512,r=Math.random()*6+1;ctx.fillStyle='rgba(40,32,24,'+(0.2+Math.random()*0.3)+')';ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
        for(i=0;i<120;i++){x=Math.random()*1024;y=Math.random()*512;r=Math.random()*14+5;ctx.strokeStyle='rgba(210,195,170,0.25)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke();ctx.fillStyle='rgba(45,35,25,0.3)';ctx.beginPath();ctx.arc(x,y,r*0.75,0,Math.PI*2);ctx.fill();}
        addNoise(ctx,1024,512,20);
        return toTex(mc.canvas);
    }

    function texVenus() {
        var mc = makeCanvas(), ctx = mc.ctx;
        ctx.fillStyle='#d49a4a'; ctx.fillRect(0,0,1024,512);
        for(var band=0;band<25;band++){var y=(band/25)*512,h=20+Math.random()*30,s=Math.random();ctx.fillStyle='rgba('+(200+s*40)+','+(150+s*50)+','+(70+s*30)+','+(0.3+Math.random()*0.3)+')';ctx.beginPath();ctx.moveTo(0,y);for(var x=0;x<=1024;x+=8){ctx.lineTo(x,y+Math.sin(x*0.01+band)*8);}ctx.lineTo(1024,y+h);for(x=1024;x>=0;x-=8){ctx.lineTo(x,y+h+Math.sin(x*0.01+band+1)*8);}ctx.closePath();ctx.fill();}
        for(i=0;i<80;i++){ctx.fillStyle='rgba(255,230,170,'+(0.05+Math.random()*0.1)+')';ctx.beginPath();ctx.ellipse(Math.random()*1024,Math.random()*512,Math.random()*40+10,Math.random()*20+5,0,0,Math.PI*2);ctx.fill();}
        addNoise(ctx,1024,512,12);
        return toTex(mc.canvas);
    }

    function texEarth() {
        var mc = makeCanvas(), ctx = mc.ctx, w=1024, h=512;
        var og=ctx.createLinearGradient(0,0,0,h);og.addColorStop(0,'#0a2a4a');og.addColorStop(0.5,'#1060a0');og.addColorStop(1,'#0a2a4a');ctx.fillStyle=og;ctx.fillRect(0,0,w,h);

            northAmerica:[[-168,65],[-160,68],[-145,70],[-125,72],[-100,73],[-80,73],[-65,70],[-55,60],[-58,50],[-62,45],[-68,40],[-75,35],[-80,30],[-85,28],[-95,27],[-105,28],[-112,30],[-120,35],[-125,40],[-128,48],[-135,55],[-148,60],[-160,60]],

        ctx.fillStyle='#3a7d2e'; for(var key in continents){drawC(continents[key]);}
        for(i=0;i<200;i++){var shades=['rgba(45,90,25,0.15)','rgba(120,90,40,0.1)','rgba(70,110,35,0.12)','rgba(150,120,60,0.08)'];ctx.fillStyle=shades[Math.floor(Math.random()*4)];ctx.beginPath();ctx.arc(Math.random()*w,Math.random()*h,5+Math.random()*15,0,Math.PI*2);ctx.fill();}
        var npg=ctx.createLinearGradient(0,0,0,60);npg.addColorStop(0,'rgba(255,255,255,0.9)');npg.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=npg;ctx.fillRect(0,0,w,60);

    function texMars() {

    var TEX = { Mercury:texMercury, Venus:texVenus, Earth:texEarth, Mars:texMars, Jupiter:texJupiter, Saturn:texSaturn, Uranus:texUranus, Neptune:texNeptune, Sun:texSun, Moon:texMoon };

    // ========================================================
    //  SCENE

    var scene, camera, renderer, controls;
    var sunMesh, sunGlow, sunCorona;
    var planetObjects = [];
    var raycaster, mouse;
    var focusedPlanet = null;
    var followState = 'none';

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 5000);
        camera.position.copy(defaultCamPos);
        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });

        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        renderer.toneMappingExposure = 1.0;
        if (renderer.outputEncoding !== undefined) renderer.outputEncoding = THREE.sRGBEncoding;
        if (renderer.outputColorSpace !== undefined) renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 3;
        controls.maxDistance = 1200;

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        scene.add(new THREE.AmbientLight(0x222233, 0.4));
        scene.add(new THREE.PointLight(0xffffff, 4, 1500, 0.5));

        createStarfield();
        createSun();
        createAllPlanets();
        createLabels();
        buildNav();

        window.addEventListener('resize', onResize);
        renderer.domElement.addEventListener('click', onClick);
        setupUI();

        // Hide loading after first frame renders
        requestAnimationFrame(function() {
            requestAnimationFrame(function() {
                var ld = document.getElementById('loading');
                ld.style.opacity = '0';
                setTimeout(function() { ld.style.display = 'none'; }, 1500);
            });
        });

        animate();
    }

    function createStarfield() {
        var N = 8000;
        var pos = new Float32Array(N*3), col = new Float32Array(N*3);
        for(var i=0;i<N;i++){
            var r=800+Math.random()*400,theta=Math.random()*Math.PI*2,phi=Math.acos(2*Math.random()-1);
            pos[i*3]=r*Math.sin(phi)*Math.cos(theta);pos[i*3+1]=r*Math.cos(phi);pos[i*3+2]=r*Math.sin(phi)*Math.sin(theta);
            var t=Math.random();
            if(t<0.7){col[i*3]=1;col[i*3+1]=1;col[i*3+2]=1;}
            else if(t<0.85){col[i*3]=0.8;col[i*3+1]=0.85;col[i*3+2]=1;}
            else if(t<0.95){col[i*3]=1;col[i*3+1]=0.9;col[i*3+2]=0.7;}
            else{col[i*3]=1;col[i*3+1]=0.7;col[i*3+2]=0.5;}
        }
        var g=new THREE.BufferGeometry();
        g.setAttribute('position',new THREE.BufferAttribute(pos,3));
        g.setAttribute('color',new THREE.BufferAttribute(col,3));
        var m=new THREE.PointsMaterial({size:1.5,vertexColors:true,transparent:true,opacity:0.9,blending:THREE.AdditiveBlending,depthWrite:false});
        scene.add(new THREE.Points(g,m));
    }

    function createSun() {
        var r=12;
        var g=new THREE.SphereGeometry(r,64,48);
        var m=new THREE.MeshBasicMaterial({map:TEX.Sun()});
        sunMesh=new THREE.Mesh(g,m);
        sunMesh.userData={isClickable:true,isSun:true,name:'Sun'};
        scene.add(sunMesh);

        var gc=makeCanvas(512,512),gx=gc.ctx;
        var gg=gx.createRadialGradient(256,256,20,256,256,256);
        gg.addColorStop(0,'rgba(255,200,80,0.8)');gg.addColorStop(0.2,'rgba(255,160,40,0.4)');gg.addColorStop(0.5,'rgba(255,120,20,0.15)');gg.addColorStop(1,'rgba(255,80,0,0)');
        gx.fillStyle=gg;gx.fillRect(0,0,512,512);
        var gt=toTex(gc.canvas);
        sunGlow=new THREE.Sprite(new THREE.SpriteMaterial({map:gt,blending:THREE.AdditiveBlending,transparent:true,depthWrite:false}));
        sunGlow.scale.set(r*5,r*5,1);
        scene.add(sunGlow);
        sunCorona=new THREE.Sprite(new THREE.SpriteMaterial({map:gt,blending:THREE.AdditiveBlending,transparent:true,opacity:0.4,depthWrite:false}));
        sunCorona.scale.set(r*10,r*10,1);
        scene.add(sunCorona);
    }

    function createAllPlanets() {
        for(var p=0;p<PLANETS.length;p++) {
            var data=PLANETS[p];
            var group=new THREE.Group();
            data._angle=Math.random()*Math.PI*2;
            var r=Math.max(0.3,data.radius);
            var g=new THREE.SphereGeometry(r,48,32);
            var m=new THREE.MeshStandardMaterial({map:TEX[data.name](),roughness:0.85,metalness:0});
            var mesh=new THREE.Mesh(g,m);
            mesh.userData={isClickable:true,name:data.name,planetData:data};

            var tiltGroup=new THREE.Group();
            tiltGroup.rotation.z=data.tilt;
            tiltGroup.add(mesh);
            group.add(tiltGroup);

            if(data.name==='Earth'){
                var ag=new THREE.SphereGeometry(r*1.08,32,24);
                var ac=makeCanvas(256,128),ax=ac.ctx;
                var agr=ax.createRadialGradient(128,64,40,128,64,128);
                agr.addColorStop(0,'rgba(100,180,255,0)');agr.addColorStop(0.7,'rgba(80,150,255,0.1)');agr.addColorStop(1,'rgba(60,120,230,0.4)');
                ax.fillStyle=agr;ax.fillRect(0,0,256,128);
                var am=new THREE.MeshBasicMaterial({map:toTex(ac.canvas),transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,side:THREE.BackSide});
                mesh.add(new THREE.Mesh(ag,am));

                var moonGroup=new THREE.Group();
                var moonMesh=new THREE.Mesh(
                    new THREE.SphereGeometry(0.5,24,16),
                    new THREE.MeshStandardMaterial({map:TEX.Moon(),roughness:0.95})
                );
                moonMesh.position.x=r*2.5;
                moonGroup.add(moonMesh);
                group.add(moonGroup);
                data._moonGroup=moonGroup;
            }

            if(data.hasRings){
                var innerR=r*1.4,outerR=r*2.5;
                var rg=new THREE.RingGeometry(innerR,outerR,96,1);
                var posAttr=rg.attributes.position,uvAttr=rg.attributes.uv;
                var v=new THREE.Vector3();
                for(var vi=0;vi<posAttr.count;vi++){v.fromBufferAttribute(posAttr,vi);var d=(v.length()-innerR)/(outerR-innerR);uvAttr.setXY(vi,d,0.5);}
                var rm=new THREE.MeshBasicMaterial({map:texSaturnRings(),transparent:true,side:THREE.DoubleSide,depthWrite:false});
                var rings=new THREE.Mesh(rg,rm);
                rings.rotation.x=Math.PI/2;
                tiltGroup.add(rings);
            }

            var og=new THREE.BufferGeometry();
            var pts=[],segs=256;
            for(var si=0;si<=segs;si++){var a=(si/segs)*Math.PI*2;pts.push(Math.cos(a)*data.distance,0,Math.sin(a)*data.distance);}
            og.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
            var ol=new THREE.Line(og,new THREE.LineBasicMaterial({color:0x445566,transparent:true,opacity:0.25}));
            scene.add(ol);

            scene.add(group);
            planetObjects.push({data:data,group:group,mesh:mesh,orbitLine:ol});
        }
    }

    function createLabels() {
        labelContainer=document.createElement('div');
        labelContainer.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:5;overflow:hidden;';
        document.body.appendChild(labelContainer);
        for(var i=0;i<planetObjects.length;i++){
            var el=document.createElement('div');
            el.className='planet-label';el.textContent=planetObjects[i].data.name;
            labelContainer.appendChild(el);planetObjects[i].label=el;
        }
        var sl=document.createElement('div');
        sl.className='planet-label';sl.textContent='Sun';sl.style.color='rgba(255,200,80,0.5)';
        labelContainer.appendChild(sl);sunMesh.userData.label=sl;
    }

    function buildNav() {
        var nav=document.getElementById('planet-nav');
        var all=[{name:'Sun',color:'#ffaa00'}].concat(PLANETS);
        for(var i=0;i<all.length;i++){
            (function(p){
                var btn=document.createElement('button');
                btn.className='nav-btn';
                btn.innerHTML='<span class="nav-dot" style="background:'+p.color+'"></span>'+p.name;
                btn.onclick=function(){focusOnPlanet(p.name);};
                nav.appendChild(btn);
            })(all[i]);
        }
    }

    function focusOnPlanet(name) {
        resetCam=false;
        if(name==='Sun'){focusedPlanet={isSun:true,name:'Sun'};followState='flying';showInfo(SUN_DATA,'#ffaa00');updateNavActive('Sun');return;}
        for(var i=0;i<planetObjects.length;i++){
            if(planetObjects[i].data.name===name){
                focusedPlanet=planetObjects[i];break;
            }
        }
        if(!focusedPlanet)return;
        followState='flying';
        showInfo(focusedPlanet.data,focusedPlanet.data.color);updateNavActive(name);
    }

    function resetView() {
        focusedPlanet=null;followState='none';resetCam=true;
        document.getElementById('info-panel').classList.remove('active');
        updateNavActive(null);
    }

    function updateNavActive(name) {
        var btns=document.querySelectorAll('.nav-btn');
        for(var i=0;i<btns.length;i++){btns[i].classList.toggle('active',name&&btns[i].textContent.indexOf(name)>=0);}
    }

    function showInfo(data,color) {
        var panel=document.getElementById('info-panel');
        document.getElementById('p-name').textContent=data.name;
        document.getElementById('p-type').textContent=data.type;
        document.getElementById('p-color').style.background=color;
        var se=document.getElementById('p-stats');se.innerHTML='';
        if(data.stats){for(var k in data.stats){var r=document.createElement('div');r.className='stat';r.innerHTML='<span class="stat-label">'+k+'</span><span class="stat-value">'+data.stats[k]+'</span>';se.appendChild(r);}}
        document.getElementById('p-desc').textContent=data.desc||'';
        document.getElementById('p-fact').textContent=data.fact||'';
        panel.classList.add('active');
    }

    function onClick(event) {
        mouse.x=(event.clientX/window.innerWidth)*2-1;
        mouse.y=-(event.clientY/window.innerHeight)*2+1;
        raycaster.setFromCamera(mouse,camera);
        var clickables=[sunMesh];
        for(var i=0;i<planetObjects.length;i++)clickables.push(planetObjects[i].mesh);
        var hits=raycaster.intersectObjects(clickables,false);
        if(hits.length>0)focusOnPlanet(hits[0].object.userData.name);
    }

    function setupUI() {
        var slider=document.getElementById('speed-slider');
        var sv=document.getElementById('speed-val');
        slider.oninput=function(){speedMultiplier=parseFloat(slider.value);sv.textContent=speedMultiplier.toFixed(1)+'x';};
        document.getElementById('btn-orbits').onclick=function(){orbitsVisible=!orbitsVisible;this.className='toggle-btn'+(orbitsVisible?' on':'');for(var i=0;i<planetObjects.length;i++)planetObjects[i].orbitLine.visible=orbitsVisible;};
        document.getElementById('btn-labels').onclick=function(){labelsVisible=!labelsVisible;this.className='toggle-btn'+(labelsVisible?' on':'');};
        document.getElementById('btn-reset').onclick=resetView;
        window.addEventListener('keydown',function(e){if(e.key==='Escape')resetView();var n=parseInt(e.key);if(n>=1&&n<=8)focusOnPlanet(PLANETS[n-1].name);if(e.key==='0')focusOnPlanet('Sun');});
    }

    function onResize() {
        camera.aspect=window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth,window.innerHeight);
    }

    function updateLabels() {
        if(!labelContainer)return;
        var w=window.innerWidth,h=window.innerHeight;
        for(var i=0;i<planetObjects.length;i++){
            var po=planetObjects[i];if(!po.label)continue;
            po.group.getWorldPosition(tempVec);
            tempVec.y+=po.data.radius+2;
            var sp=tempVec.clone().project(camera);
            if(sp.z<1&&labelsVisible){
                po.label.style.display='block';
                po.label.style.left=((sp.x*0.5+0.5)*w)+'px';
                po.label.style.top=((-sp.y*0.5+0.5)*h)+'px';
                var dist=camera.position.distanceTo(po.group.getWorldPosition(tempVec));
                po.label.style.opacity=Math.max(0.2,Math.min(0.8,200/dist));
            }else po.label.style.display='none';
        }
    }

    function animate() {
        requestAnimationFrame(animate);
        var dt=clock.getDelta(),t=clock.getElapsedTime();

        sunMesh.rotation.y+=0.0008*(speedMultiplier>0?1:0);
        if(sunGlow){var p=1+Math.sin(t*0.8)*0.03;sunGlow.scale.set(60*p,60*p,1);}
        if(sunCorona){var p2=1+Math.sin(t*0.5)*0.05;sunCorona.scale.set(120*p2,120*p2,1);}

        for(var i=0;i<planetObjects.length;i++){
            var po=planetObjects[i],d=po.data;
            var os=(2*Math.PI/d.orbitalPeriod)*30;
            d._angle+=os*dt*speedMultiplier;
            po.group.position.x=Math.cos(d._angle)*d.distance;
            po.group.position.z=Math.sin(d._angle)*d.distance;
            var rs=(2*Math.PI/Math.abs(d.rotationPeriod))*200;
            po.mesh.rotation.y+=rs*dt*speedMultiplier*Math.sign(d.rotationPeriod);
            if(d._moonGroup)d._moonGroup.rotation.y+=0.5*dt*speedMultiplier;
        }

        if(followState==='flying'||followState==='following'){
            var tp=new THREE.Vector3(),tr=12;
            if(focusedPlanet){
                if(focusedPlanet.isSun){tp.set(0,0,0);tr=12;}
                else{focusedPlanet.group.getWorldPosition(tp);tr=focusedPlanet.data.radius;}
                if(followState==='flying'){
                    var off=tr*4+8;
                    var dp=tp.clone();dp.x+=off*0.5;dp.y+=off*0.4;dp.z+=off;
                    camera.position.lerp(dp,0.045);controls.target.lerp(tp,0.08);
                    if(camera.position.distanceTo(dp)<off*0.08){followState='following';lastPlanetPos.copy(tp);}
                }else{
                    var delta=tp.clone().sub(lastPlanetPos);
                    camera.position.add(delta);controls.target.add(delta);lastPlanetPos.copy(tp);
                }
            }
        }

        if(resetCam){
            camera.position.lerp(defaultCamPos,0.03);
            controls.target.lerp(new THREE.Vector3(0,0,0),0.03);
            if(camera.position.distanceTo(defaultCamPos)<1)resetCam=false;
        }

        controls.update();
        updateLabels();
        renderer.render(scene,camera);
    }

    // ========================================================
    //  START
    // ========================================================
    try {
        if (typeof THREE === 'undefined') {
            showError('Three.js failed to load. Check your internet connection.');
        } else {
            init();
        }
    } catch(err) {
        showError(err.message || 'Unknown initialization error');
    }
    </script>
</body>
</html>
