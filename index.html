<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Solar System | Interactive 3D Explorer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body {
            background: #000;
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas-container { width: 100vw; height: 100vh; cursor: grab; }
        #canvas-container:active { cursor: grabbing; }

        #loading {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
            transition: opacity 1.5s ease;
        }
        .spinner {
            width: 80px; height: 80px;
            border: 3px solid rgba(255,165,0,0.1);
            border-top-color: #ffa500;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading p {
            margin-top: 24px; color: #667;
            letter-spacing: 4px; font-size: 13px; font-weight: 300;
        }
        #loading .err {
            color: #ff5555; font-size: 13px; margin-top: 12px;
            max-width: 400px; text-align: center; line-height: 1.5;
            display: none; letter-spacing: 0;
        }
        #loading .progress {
            width: 200px; height: 2px; background: rgba(255,255,255,0.1);
            border-radius: 1px; margin-top: 20px; overflow: hidden;
        }
        #loading .progress-bar {
            height: 100%; width: 0%; background: #ffa500;
            transition: width 0.3s ease;
        }

        #header {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%); z-index: 10;
            text-align: center; pointer-events: none;
        }
        #header h1 { font-size: 18px; font-weight: 200; letter-spacing: 6px; text-transform: uppercase; }
        #header p { font-size: 10px; color: #445; letter-spacing: 3px; margin-top: 2px; }

        #info-panel {
            position: fixed; top: 20px; left: 20px;
            background: rgba(8, 12, 24, 0.82);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px; padding: 0;
            max-width: 340px; width: 340px;
            opacity: 0; transform: translateX(-20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none; overflow: hidden;
        }
        #info-panel.active { opacity: 1; transform: translateX(0); pointer-events: auto; }
        #info-panel .planet-header { padding: 20px 24px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); }
        #info-panel .planet-color-bar { height: 4px; border-radius: 2px; margin-bottom: 12px; width: 40px; }
        #info-panel h2 { font-size: 26px; font-weight: 700; margin-bottom: 4px; }
        #info-panel .subtitle { font-size: 12px; color: #7788aa; letter-spacing: 1px; text-transform: uppercase; }
        #info-panel .body { padding: 16px 24px 20px; }
        #info-panel .stat { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; }
        #info-panel .stat-label { color: #7788aa; }
        #info-panel .stat-value { font-weight: 600; color: #ccd5e8; }
        #info-panel .desc { margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); font-size: 13px; line-height: 1.6; color: #99aabb; }
        #info-panel .fact { margin-top: 10px; padding: 10px 14px; background: rgba(255,165,0,0.08); border-left: 3px solid #ffa500; border-radius: 4px; font-size: 13px; line-height: 1.5; color: #ddc; }

        #planet-nav {
            position: fixed; top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 6px; z-index: 10;
        }
        .nav-btn {
            background: rgba(8, 12, 24, 0.82);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            color: #ccd5e8; padding: 8px 16px; border-radius: 10px;
            cursor: pointer; font-size: 13px; transition: all 0.2s;
            text-align: left; min-width: 120px;
            display: flex; align-items: center; gap: 10px;
        }
        .nav-btn:hover { background: rgba(255,165,0,0.1); border-color: rgba(255,165,0,0.25); transform: translateX(-3px); }
        .nav-btn.active { background: rgba(255,165,0,0.15); border-color: rgba(255,165,0,0.4); }
        .nav-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

        #controls {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(8, 12, 24, 0.82);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; padding: 10px 22px;
            display: flex; align-items: center; gap: 24px; z-index: 10;
        }
        .ctrl-group { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #7788aa; }
        .ctrl-group label { white-space: nowrap; }
        #speed-slider {
            width: 120px; -webkit-appearance: none; appearance: none;
            height: 4px; border-radius: 2px;
            background: rgba(255,255,255,0.1); outline: none;
        }
        #speed-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #ffa500; cursor: pointer; }
        #speed-slider::-moz-range-thumb { width: 14px; height: 14px; border: none; border-radius: 50%; background: #ffa500; cursor: pointer; }
        .toggle-btn {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: #8899bb; padding: 6px 14px; border-radius: 8px;
            cursor: pointer; font-size: 12px; transition: all 0.2s; white-space: nowrap;
        }
        .toggle-btn:hover { color: #fff; border-color: rgba(255,255,255,0.2); }
        .toggle-btn.on { background: rgba(255,165,0,0.12); border-color: rgba(255,165,0,0.3); color: #ffa500; }
        .planet-label {
            color: rgba(255,255,255,0.6); font-size: 11px; font-weight: 500;
            letter-spacing: 1px; text-transform: uppercase;
            pointer-events: none; text-shadow: 0 0 8px rgba(0,0,0,0.8);
            position: absolute; white-space: nowrap;
        }
        #hint {
            position: fixed; bottom: 75px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.25); font-size: 12px;
            pointer-events: none; z-index: 5;
            animation: hintFade 5s 3s forwards;
        }
        @keyframes hintFade { to { opacity: 0; } }
        @media (max-width: 768px) {
            #info-panel { max-width: calc(100vw - 40px); width: calc(100vw - 40px); top: auto; bottom: 80px; left: 20px; }
            #planet-nav { gap: 4px; }
            .nav-btn { min-width: auto; padding: 6px 10px; font-size: 11px; }
            #controls { flex-wrap: wrap; justify-content: center; gap: 12px; padding: 8px 16px; }
            #speed-slider { width: 80px; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p id="loading-text">LOADING SOLAR SYSTEM</p>
        <div class="progress"><div class="progress-bar" id="load-progress"></div></div>
        <p class="err" id="loading-error"></p>
    </div>
    <div id="canvas-container"></div>
    <div id="header"><h1>Solar System</h1><p>Interactive 3D Explorer</p></div>
    <div id="planet-nav"></div>
    <div id="info-panel">
        <div class="planet-header">
            <div class="planet-color-bar" id="p-color"></div>
            <h2 id="p-name"></h2>
            <div class="subtitle" id="p-type"></div>
        </div>
        <div class="body">
            <div id="p-stats"></div>
            <div class="desc" id="p-desc"></div>
            <div class="fact" id="p-fact"></div>
        </div>
    </div>
    <div id="controls">
        <div class="ctrl-group">
            <label>Speed</label>
            <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1">
            <span id="speed-val" style="min-width:30px;color:#ccd5e8;">1.0x</span>
        </div>
        <div class="ctrl-group">
            <button class="toggle-btn on" id="btn-orbits">Orbits</button>
            <button class="toggle-btn on" id="btn-labels">Labels</button>
            <button class="toggle-btn" id="btn-reset">Overview</button>
        </div>
    </div>
    <div id="hint">Click a planet to focus · Drag to rotate · Scroll to zoom</div>

    <!-- Three.js bundled locally -->
    <script src="js/three.min.js"></script>
    <script src="js/OrbitControls.js"></script>

    <script>
    function showError(msg) {
        document.getElementById('loading-text').textContent = 'ERROR';
        var el = document.getElementById('loading-error');
        el.textContent = msg; el.style.display = 'block';
        console.error('Solar System Error:', msg);
    }
    window.addEventListener('error', function(e) { showError(e.message || 'Unknown error'); });

    // ========================================================
    //  PLANET DATA
    // ========================================================
    var SUN_DATA = {
        name: 'Sun', type: 'G-type Main-Sequence Star (G2V)', color: '#ffaa00',
        stats: { 'Diameter': '1,392,700 km', 'Surface Temp': '5,500°C', 'Core Temp': '15M °C', 'Age': '4.6 billion years', 'Mass': '1.989 × 10^30 kg', 'Composition': '73% H, 25% He' },
        desc: 'The Sun is the star at the center of our Solar System. It contains 99.86% of the total mass of the system and produces energy through nuclear fusion of hydrogen into helium in its core.',
        fact: 'Over 1 million Earths could fit inside the Sun.'
    };

    var PLANETS = [
        { name: 'Mercury', type: 'Terrestrial Planet', radius: 1.2, distance: 22, orbitalPeriod: 88, rotationPeriod: 1407.6, tilt: 0.034, color: '#a0826d', tex: 'mercury.jpg',
          stats: { 'Diameter': '4,879 km', 'Distance from Sun': '57.9M km (0.39 AU)', 'Orbital Period': '88 days', 'Day Length': '1,408 hours', 'Moons': '0', 'Temperature': '-173°C to 427°C' },
          desc: 'The smallest and innermost planet. Mercury has virtually no atmosphere, leaving it covered in craters from billions of years of impacts.',
          fact: 'A day on Mercury (sunrise to sunrise) lasts 176 Earth days — longer than its year!' },
        { name: 'Venus', type: 'Terrestrial Planet', radius: 2.6, distance: 34, orbitalPeriod: 225, rotationPeriod: -5832, tilt: 3.096, color: '#e8b772', tex: 'venus.jpg',
          stats: { 'Diameter': '12,104 km', 'Distance from Sun': '108.2M km (0.72 AU)', 'Orbital Period': '225 days', 'Day Length': '5,832 hours', 'Moons': '0', 'Temperature': '462°C (hottest)' },
          desc: 'Venus is the hottest planet due to its thick CO2 atmosphere creating a runaway greenhouse effect. Its surface pressure is 92 times that of Earth.',
          fact: 'Venus rotates backwards! The Sun rises in the west and sets in the east.' },
        { name: 'Earth', type: 'Terrestrial Planet (Our Home)', radius: 2.8, distance: 50, orbitalPeriod: 365, rotationPeriod: 24, tilt: 0.4091, color: '#4a90d9', tex: 'earth.jpg',
          stats: { 'Diameter': '12,742 km', 'Distance from Sun': '149.6M km (1 AU)', 'Orbital Period': '365.25 days', 'Day Length': '24 hours', 'Moons': '1 (Luna)', 'Temperature': '-88°C to 58°C' },
          desc: 'Earth is the only known planet harboring life. Its atmosphere of nitrogen and oxygen, liquid water oceans, and protective magnetic field make it uniquely habitable. 71% of its surface is covered by water.',
          fact: 'Earth is the only planet not named after a Greek or Roman deity.' },
        { name: 'Mars', type: 'Terrestrial Planet', radius: 1.6, distance: 68, orbitalPeriod: 687, rotationPeriod: 24.7, tilt: 0.4396, color: '#c1502d', tex: 'mars.jpg',
          stats: { 'Diameter': '6,779 km', 'Distance from Sun': '227.9M km (1.52 AU)', 'Orbital Period': '687 days', 'Day Length': '24.7 hours', 'Moons': '2 (Phobos, Deimos)', 'Temperature': '-153°C to 20°C' },
          desc: 'The Red Planet gets its color from iron oxide (rust) on its surface. Mars has the largest volcano (Olympus Mons - 22 km tall) and deepest canyon (Valles Marineris) in the solar system.',
          fact: 'Olympus Mons on Mars is nearly 3x taller than Mount Everest!' },
        { name: 'Jupiter', type: 'Gas Giant', radius: 7.5, distance: 105, orbitalPeriod: 4333, rotationPeriod: 9.9, tilt: 0.0546, color: '#c88b3a', tex: 'jupiter.jpg',
          stats: { 'Diameter': '139,820 km', 'Distance from Sun': '778.5M km (5.2 AU)', 'Orbital Period': '11.9 years', 'Day Length': '9.9 hours', 'Moons': '95 known', 'Temperature': '-145°C (cloud tops)' },
          desc: 'The largest planet — more massive than all other planets combined. Its iconic Great Red Spot is a massive storm that has raged for at least 350 years.',
          fact: 'Jupiter\'s Great Red Spot is a storm larger than Earth, spinning for 350+ years.' },
        { name: 'Saturn', type: 'Gas Giant', radius: 6.2, distance: 145, orbitalPeriod: 10759, rotationPeriod: 10.7, tilt: 0.4665, color: '#d4b878', tex: 'saturn.jpg', hasRings: true,
          stats: { 'Diameter': '116,460 km', 'Distance from Sun': '1.43B km (9.58 AU)', 'Orbital Period': '29.5 years', 'Day Length': '10.7 hours', 'Moons': '146 known', 'Temperature': '-178°C' },
          desc: 'Famous for its spectacular ring system made of billions of ice particles and rocks. Saturn is the least dense planet — it would float in water.',
          fact: 'Saturn is so low-density it would float in water (if you had a big enough bathtub).' },
        { name: 'Uranus', type: 'Ice Giant', radius: 4.0, distance: 185, orbitalPeriod: 30687, rotationPeriod: -17.2, tilt: 1.7064, color: '#9fdfdf', tex: 'uranus.jpg',
          stats: { 'Diameter': '50,724 km', 'Distance from Sun': '2.87B km (19.2 AU)', 'Orbital Period': '84 years', 'Day Length': '17.2 hours', 'Moons': '28 known', 'Temperature': '-224°C' },
          desc: 'An ice giant with a pale cyan color from methane in its atmosphere. It has the most extreme axial tilt — it essentially rotates on its side.',
          fact: 'Uranus rotates on its side (98° tilt) — it rolls around the Sun like a ball!' },
        { name: 'Neptune', type: 'Ice Giant', radius: 3.9, distance: 225, orbitalPeriod: 60190, rotationPeriod: 16.1, tilt: 0.4943, color: '#3060cc', tex: 'neptune.jpg',
          stats: { 'Diameter': '49,244 km', 'Distance from Sun': '4.50B km (30.05 AU)', 'Orbital Period': '165 years', 'Day Length': '16.1 hours', 'Moons': '16 known', 'Temperature': '-214°C' },
          desc: 'The farthest planet from the Sun. Neptune has the fastest winds in the solar system — reaching 2,100 km/h.',
          fact: 'Neptune has the strongest winds in the solar system — up to 2,100 km/h!' }
    ];

    // ========================================================
    //  TEXTURE LOADING with progress tracking
    // ========================================================
    var manager = new THREE.LoadingManager();
    var totalAssets = 0;
    var loadedAssets = 0;

    manager.onProgress = function(url, loaded, total) {
        loadedAssets = loaded;
        totalAssets = total;
        var pct = Math.round((loaded / total) * 100);
        var bar = document.getElementById('load-progress');
        if (bar) bar.style.width = pct + '%';
    };

    var loader = new THREE.TextureLoader(manager);

    function loadTex(path) {
        var tex = loader.load(path);
        if (tex.encoding !== undefined) tex.encoding = THREE.sRGBEncoding;
        if (tex.colorSpace !== undefined) tex.colorSpace = THREE.SRGBColorSpace;
        tex.anisotropy = 16; // Maximum anisotropic filtering for sharp textures at angles
        return tex;
    }

    // ========================================================
    //  SCENE
    // ========================================================
    var scene, camera, renderer, controls;
    var sunMesh, sunGlow, sunCorona;
    var planetObjects = [];
    var raycaster, mouse;
    var focusedPlanet = null;
    var followState = 'none';
    var lastPlanetPos = new THREE.Vector3();
    var defaultCamPos = new THREE.Vector3(0, 100, 250);
    var speedMultiplier = 1;
    var orbitsVisible = true;
    var labelsVisible = true;
    var clock = new THREE.Clock();
    var resetCam = false;
    var labelContainer;
    var tempVec = new THREE.Vector3();

    function init() {
        scene = new THREE.Scene();

        camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
        camera.position.copy(defaultCamPos);

        renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        if (renderer.outputEncoding !== undefined) renderer.outputEncoding = THREE.sRGBEncoding;
        if (renderer.outputColorSpace !== undefined) renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.minDistance = 2;
        controls.maxDistance = 1200;

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        // Lighting — the sun is the primary light source
        scene.add(new THREE.AmbientLight(0x333344, 0.3));
        var sunLight = new THREE.PointLight(0xffffff, 3.5, 2000, 0.4);
        scene.add(sunLight);

        createStarfield();
        createSun();
        createAllPlanets();
        createLabels();
        buildNav();

        window.addEventListener('resize', onResize);
        renderer.domElement.addEventListener('click', onClick);
        setupUI();

        // Hide loading after textures load or after 8 seconds (whichever first)
        manager.onLoad = hideLoading;
        setTimeout(hideLoading, 8000); // Fallback

        animate();
    }

    function hideLoading() {
        if (hideLoading._done) return;
        hideLoading._done = true;
        var ld = document.getElementById('loading');
        ld.style.opacity = '0';
        setTimeout(function() { ld.style.display = 'none'; }, 1500);
    }

    // ========================================================
    //  STARFIELD
    // ========================================================
    function createStarfield() {
        var N = 12000;
        var pos = new Float32Array(N * 3), col = new Float32Array(N * 3);
        for (var i = 0; i < N; i++) {
            var r = 800 + Math.random() * 600;
            var theta = Math.random() * Math.PI * 2;
            var phi = Math.acos(2 * Math.random() - 1);
            pos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
            pos[i*3+1] = r * Math.cos(phi);
            pos[i*3+2] = r * Math.sin(phi) * Math.sin(theta);
            var t = Math.random();
            if (t < 0.7)       { col[i*3]=1; col[i*3+1]=1; col[i*3+2]=1; }
            else if (t < 0.85) { col[i*3]=0.8; col[i*3+1]=0.85; col[i*3+2]=1; }
            else if (t < 0.95) { col[i*3]=1; col[i*3+1]=0.9; col[i*3+2]=0.7; }
            else               { col[i*3]=1; col[i*3+1]=0.7; col[i*3+2]=0.5; }
        }
        var g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        g.setAttribute('color', new THREE.BufferAttribute(col, 3));
        var m = new THREE.PointsMaterial({ size: 1.5, vertexColors: true, transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, depthWrite: false });
        scene.add(new THREE.Points(g, m));
    }

    // ========================================================
    //  SUN — 8K texture + emissive glow + corona sprite
    // ========================================================
    function createSun() {
        var r = 12;
        var geo = new THREE.SphereGeometry(r, 128, 96);
        var sunTexture = loadTex('textures/sun.jpg');
        var mat = new THREE.MeshBasicMaterial({ map: sunTexture });
        sunMesh = new THREE.Mesh(geo, mat);
        sunMesh.userData = { isClickable: true, isSun: true, name: 'Sun' };
        scene.add(sunMesh);

        // Glow sprite
        var gc = document.createElement('canvas');
        gc.width = 512; gc.height = 512;
        var gx = gc.getContext('2d');
        var gg = gx.createRadialGradient(256, 256, 20, 256, 256, 256);
        gg.addColorStop(0, 'rgba(255,200,80,0.8)');
        gg.addColorStop(0.2, 'rgba(255,160,40,0.4)');
        gg.addColorStop(0.5, 'rgba(255,120,20,0.15)');
        gg.addColorStop(1, 'rgba(255,80,0,0)');
        gx.fillStyle = gg; gx.fillRect(0, 0, 512, 512);
        var gTex = new THREE.CanvasTexture(gc);
        if (gTex.encoding !== undefined) gTex.encoding = THREE.sRGBEncoding;

        sunGlow = new THREE.Sprite(new THREE.SpriteMaterial({ map: gTex, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false }));
        sunGlow.scale.set(r * 5, r * 5, 1);
        scene.add(sunGlow);

        sunCorona = new THREE.Sprite(new THREE.SpriteMaterial({ map: gTex, blending: THREE.AdditiveBlending, transparent: true, opacity: 0.4, depthWrite: false }));
        sunCorona.scale.set(r * 10, r * 10, 1);
        scene.add(sunCorona);
    }

    // ========================================================
    //  PLANETS — high-res textures, high-poly geometry
    // ========================================================
    function createAllPlanets() {
        for (var pi = 0; pi < PLANETS.length; pi++) {
            var data = PLANETS[pi];
            var group = new THREE.Group();
            data._angle = Math.random() * Math.PI * 2;

            var r = Math.max(0.3, data.radius);
            // High-poly spheres for smooth surfaces at close zoom
            var segs = (r >= 5) ? 128 : 96; // Gas giants get extra detail
            var geo = new THREE.SphereGeometry(r, segs, Math.floor(segs * 0.75));
            var texture = loadTex('textures/' + data.tex);

            var mat = new THREE.MeshStandardMaterial({
                map: texture,
                roughness: 0.85,
                metalness: 0.0
            });

            var mesh = new THREE.Mesh(geo, mat);
            mesh.userData = { isClickable: true, name: data.name, planetData: data };

            // Axial tilt
            var tiltGroup = new THREE.Group();
            tiltGroup.rotation.z = data.tilt;
            tiltGroup.add(mesh);
            group.add(tiltGroup);

            // Earth: clouds layer + atmosphere + moon
            if (data.name === 'Earth') {
                // Clouds — separate transparent layer
                var cloudTex = loadTex('textures/earth_clouds.jpg');
                var cloudGeo = new THREE.SphereGeometry(r * 1.01, 96, 72);
                var cloudMat = new THREE.MeshStandardMaterial({
                    map: cloudTex,
                    transparent: true,
                    opacity: 0.4,
                    depthWrite: false,
                    blending: THREE.NormalBlending
                });
                var clouds = new THREE.Mesh(cloudGeo, cloudMat);
                mesh.add(clouds);
                data._clouds = clouds;

                // Atmosphere glow
                var atmoGeo = new THREE.SphereGeometry(r * 1.08, 64, 48);
                var ac = document.createElement('canvas');
                ac.width = 256; ac.height = 128;
                var ax = ac.getContext('2d');
                var agr = ax.createRadialGradient(128, 64, 40, 128, 64, 128);
                agr.addColorStop(0, 'rgba(100,180,255,0)');
                agr.addColorStop(0.7, 'rgba(80,150,255,0.1)');
                agr.addColorStop(1, 'rgba(60,120,230,0.4)');
                ax.fillStyle = agr; ax.fillRect(0, 0, 256, 128);
                var aTex = new THREE.CanvasTexture(ac);
                if (aTex.encoding !== undefined) aTex.encoding = THREE.sRGBEncoding;
                var atmoMat = new THREE.MeshBasicMaterial({
                    map: aTex, transparent: true, blending: THREE.AdditiveBlending,
                    depthWrite: false, side: THREE.BackSide
                });
                mesh.add(new THREE.Mesh(atmoGeo, atmoMat));

                // Moon
                var moonTex = loadTex('textures/moon.jpg');
                var moonGeo = new THREE.SphereGeometry(0.5, 64, 48);
                var moonMat = new THREE.MeshStandardMaterial({ map: moonTex, roughness: 0.95 });
                var moonMesh = new THREE.Mesh(moonGeo, moonMat);
                moonMesh.position.x = r * 2.5;
                var moonGroup = new THREE.Group();
                moonGroup.add(moonMesh);
                group.add(moonGroup);
                data._moonGroup = moonGroup;
            }

            // Saturn rings — using real ring texture with alpha
            if (data.hasRings) {
                var innerR = r * 1.4, outerR = r * 2.5;
                var ringGeo = new THREE.RingGeometry(innerR, outerR, 128, 1);

                // Fix UVs so texture maps radially
                var posAttr = ringGeo.attributes.position;
                var uvAttr = ringGeo.attributes.uv;
                var v = new THREE.Vector3();
                for (var vi = 0; vi < posAttr.count; vi++) {
                    v.fromBufferAttribute(posAttr, vi);
                    var d = (v.length() - innerR) / (outerR - innerR);
                    uvAttr.setXY(vi, d, 0.5);
                }

                // Load ring texture
                var ringTex = loader.load('textures/saturn_rings.png');
                ringTex.anisotropy = 16;

                var ringMat = new THREE.MeshBasicMaterial({
                    map: ringTex, transparent: true,
                    side: THREE.DoubleSide, depthWrite: false
                });
                var rings = new THREE.Mesh(ringGeo, ringMat);
                rings.rotation.x = Math.PI / 2;
                tiltGroup.add(rings);
            }

            // Orbit line
            var og = new THREE.BufferGeometry();
            var pts = [], segs2 = 256;
            for (var si = 0; si <= segs2; si++) {
                var a = (si / segs2) * Math.PI * 2;
                pts.push(Math.cos(a) * data.distance, 0, Math.sin(a) * data.distance);
            }
            og.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
            var ol = new THREE.Line(og, new THREE.LineBasicMaterial({ color: 0x445566, transparent: true, opacity: 0.25 }));
            scene.add(ol);

            scene.add(group);
            planetObjects.push({ data: data, group: group, mesh: mesh, orbitLine: ol });
        }
    }

    // ========================================================
    //  LABELS
    // ========================================================
    function createLabels() {
        labelContainer = document.createElement('div');
        labelContainer.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:5;overflow:hidden;';
        document.body.appendChild(labelContainer);
        for (var i = 0; i < planetObjects.length; i++) {
            var el = document.createElement('div');
            el.className = 'planet-label';
            el.textContent = planetObjects[i].data.name;
            labelContainer.appendChild(el);
            planetObjects[i].label = el;
        }
        var sl = document.createElement('div');
        sl.className = 'planet-label'; sl.textContent = 'Sun';
        sl.style.color = 'rgba(255,200,80,0.5)';
        labelContainer.appendChild(sl);
        sunMesh.userData.label = sl;
    }

    // ========================================================
    //  NAV
    // ========================================================
    function buildNav() {
        var nav = document.getElementById('planet-nav');
        var all = [{ name: 'Sun', color: '#ffaa00' }].concat(PLANETS);
        for (var i = 0; i < all.length; i++) {
            (function(p) {
                var btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.innerHTML = '<span class="nav-dot" style="background:' + p.color + '"></span>' + p.name;
                btn.onclick = function() { focusOnPlanet(p.name); };
                nav.appendChild(btn);
            })(all[i]);
        }
    }

    // ========================================================
    //  FOCUS / RESET
    // ========================================================
    function focusOnPlanet(name) {
        resetCam = false;
        if (name === 'Sun') {
            focusedPlanet = { isSun: true, name: 'Sun' };
            followState = 'flying';
            showInfo(SUN_DATA, '#ffaa00');
            updateNavActive('Sun');
            return;
        }
        for (var i = 0; i < planetObjects.length; i++) {
            if (planetObjects[i].data.name === name) {
                focusedPlanet = planetObjects[i]; break;
            }
        }
        if (!focusedPlanet) return;
        followState = 'flying';
        showInfo(focusedPlanet.data, focusedPlanet.data.color);
        updateNavActive(name);
    }

    function resetView() {
        focusedPlanet = null; followState = 'none'; resetCam = true;
        document.getElementById('info-panel').classList.remove('active');
        updateNavActive(null);
    }

    function updateNavActive(name) {
        var btns = document.querySelectorAll('.nav-btn');
        for (var i = 0; i < btns.length; i++) {
            btns[i].classList.toggle('active', name && btns[i].textContent.indexOf(name) >= 0);
        }
    }

    function showInfo(data, color) {
        var panel = document.getElementById('info-panel');
        document.getElementById('p-name').textContent = data.name;
        document.getElementById('p-type').textContent = data.type;
        document.getElementById('p-color').style.background = color;
        var se = document.getElementById('p-stats'); se.innerHTML = '';
        if (data.stats) { for (var k in data.stats) { var row = document.createElement('div'); row.className = 'stat'; row.innerHTML = '<span class="stat-label">' + k + '</span><span class="stat-value">' + data.stats[k] + '</span>'; se.appendChild(row); } }
        document.getElementById('p-desc').textContent = data.desc || '';
        document.getElementById('p-fact').textContent = data.fact || '';
        panel.classList.add('active');
    }

    function onClick(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        var clickables = [sunMesh];
        for (var i = 0; i < planetObjects.length; i++) clickables.push(planetObjects[i].mesh);
        var hits = raycaster.intersectObjects(clickables, false);
        if (hits.length > 0) focusOnPlanet(hits[0].object.userData.name);
    }

    function setupUI() {
        var slider = document.getElementById('speed-slider');
        var sv = document.getElementById('speed-val');
        slider.oninput = function() { speedMultiplier = parseFloat(slider.value); sv.textContent = speedMultiplier.toFixed(1) + 'x'; };
        document.getElementById('btn-orbits').onclick = function() {
            orbitsVisible = !orbitsVisible; this.className = 'toggle-btn' + (orbitsVisible ? ' on' : '');
            for (var i = 0; i < planetObjects.length; i++) planetObjects[i].orbitLine.visible = orbitsVisible;
        };
        document.getElementById('btn-labels').onclick = function() {
            labelsVisible = !labelsVisible; this.className = 'toggle-btn' + (labelsVisible ? ' on' : '');
        };
        document.getElementById('btn-reset').onclick = resetView;
        window.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') resetView();
            var n = parseInt(e.key);
            if (n >= 1 && n <= 8) focusOnPlanet(PLANETS[n-1].name);
            if (e.key === '0') focusOnPlanet('Sun');
        });
    }

    function onResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function updateLabels() {
        if (!labelContainer) return;
        var w = window.innerWidth, h = window.innerHeight;
        for (var i = 0; i < planetObjects.length; i++) {
            var po = planetObjects[i]; if (!po.label) continue;
            po.group.getWorldPosition(tempVec);
            tempVec.y += po.data.radius + 2;
            var sp = tempVec.clone().project(camera);
            if (sp.z < 1 && labelsVisible) {
                po.label.style.display = 'block';
                po.label.style.left = ((sp.x * 0.5 + 0.5) * w) + 'px';
                po.label.style.top = ((-sp.y * 0.5 + 0.5) * h) + 'px';
                var dist = camera.position.distanceTo(po.group.getWorldPosition(tempVec));
                po.label.style.opacity = Math.max(0.2, Math.min(0.8, 200 / dist));
            } else po.label.style.display = 'none';
        }
    }

    // ========================================================
    //  ANIMATION LOOP
    // ========================================================
    function animate() {
        requestAnimationFrame(animate);
        var dt = Math.min(clock.getDelta(), 0.1); // Cap delta to prevent jumps
        var t = clock.getElapsedTime();

        // Sun rotation + glow pulse
        sunMesh.rotation.y += 0.0008 * (speedMultiplier > 0 ? 1 : 0);
        if (sunGlow) { var p = 1 + Math.sin(t * 0.8) * 0.03; sunGlow.scale.set(60 * p, 60 * p, 1); }
        if (sunCorona) { var p2 = 1 + Math.sin(t * 0.5) * 0.05; sunCorona.scale.set(120 * p2, 120 * p2, 1); }

        // Planets
        for (var i = 0; i < planetObjects.length; i++) {
            var po = planetObjects[i], d = po.data;

            // Orbital motion
            var os = (2 * Math.PI / d.orbitalPeriod) * 30;
            d._angle += os * dt * speedMultiplier;
            po.group.position.x = Math.cos(d._angle) * d.distance;
            po.group.position.z = Math.sin(d._angle) * d.distance;

            // Axial rotation
            var rs = (2 * Math.PI / Math.abs(d.rotationPeriod)) * 200;
            po.mesh.rotation.y += rs * dt * speedMultiplier * Math.sign(d.rotationPeriod);

            // Earth clouds rotate slightly faster than surface
            if (d._clouds) d._clouds.rotation.y += rs * dt * speedMultiplier * 0.15;

            // Moon orbit
            if (d._moonGroup) d._moonGroup.rotation.y += 0.5 * dt * speedMultiplier;
        }

        // Camera focus logic
        if (followState === 'flying' || followState === 'following') {
            var tp = new THREE.Vector3(), tr = 12;
            if (focusedPlanet) {
                if (focusedPlanet.isSun) { tp.set(0, 0, 0); tr = 12; }
                else { focusedPlanet.group.getWorldPosition(tp); tr = focusedPlanet.data.radius; }

                if (followState === 'flying') {
                    var off = tr * 4 + 8;
                    var dp = tp.clone();
                    dp.x += off * 0.5; dp.y += off * 0.4; dp.z += off;
                    camera.position.lerp(dp, 0.045);
                    controls.target.lerp(tp, 0.08);
                    if (camera.position.distanceTo(dp) < off * 0.08) {
                        followState = 'following';
                        lastPlanetPos.copy(tp);
                    }
                } else {
                    var delta = tp.clone().sub(lastPlanetPos);
                    camera.position.add(delta);
                    controls.target.add(delta);
                    lastPlanetPos.copy(tp);
                }
            }
        }

        // Reset camera
        if (resetCam) {
            camera.position.lerp(defaultCamPos, 0.03);
            controls.target.lerp(new THREE.Vector3(0, 0, 0), 0.03);
            if (camera.position.distanceTo(defaultCamPos) < 1) resetCam = false;
        }

        controls.update();
        updateLabels();
        renderer.render(scene, camera);
    }

    // ========================================================
    //  START
    // ========================================================
    try {
        if (typeof THREE === 'undefined') {
            showError('Three.js failed to load.');
        } else {
            init();
        }
    } catch(err) {
        showError(err.message || 'Unknown initialization error');
    }
    </script>
</body>
</html>
