<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Solar System 3D</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:system-ui,sans-serif; color:#fff; }
        #c { width:100vw; height:100vh; cursor:grab; }
        #c:active { cursor:grabbing; }

        #ld { position:fixed; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity 1s; }
        #ld .sp { width:60px; height:60px; border:3px solid rgba(255,165,0,0.1); border-top-color:#ffa500; border-radius:50%; animation:sp 1s linear infinite; }
        @keyframes sp { to { transform:rotate(360deg); } }
        #ld .tx { margin-top:20px; color:#667; font-size:13px; letter-spacing:3px; }
        #ld .er { color:#f55; font-size:12px; margin-top:10px; max-width:350px; text-align:center; line-height:1.5; display:none; }
        #ld .pg { width:180px; height:2px; background:rgba(255,255,255,0.1); border-radius:1px; margin-top:16px; overflow:hidden; }
        #ld .pb { height:100%; width:0%; background:#ffa500; transition:width 0.3s; }

        #hd { position:fixed; top:16px; left:50%; transform:translateX(-50%); z-index:10; text-align:center; pointer-events:none; }
        #hd h1 { font-size:16px; font-weight:200; letter-spacing:5px; text-transform:uppercase; }
        #hd p { font-size:9px; color:#345; letter-spacing:3px; margin-top:2px; }

        #ip { position:fixed; top:16px; left:16px; background:rgba(8,12,24,0.85); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.08); border-radius:14px; max-width:320px; width:320px; opacity:0; transform:translateX(-15px); transition:all 0.4s; pointer-events:none; overflow:hidden; }
        #ip.on { opacity:1; transform:translateX(0); pointer-events:auto; }
        #ip .ph { padding:18px 20px 10px; border-bottom:1px solid rgba(255,255,255,0.06); }
        #ip .cb { height:3px; border-radius:2px; margin-bottom:10px; width:36px; }
        #ip h2 { font-size:24px; font-weight:700; margin-bottom:3px; }
        #ip .st { font-size:11px; color:#7788aa; letter-spacing:1px; text-transform:uppercase; }
        #ip .bd { padding:14px 20px 18px; }
        #ip .sr { display:flex; justify-content:space-between; padding:4px 0; font-size:13px; }
        #ip .sl { color:#7788aa; }
        #ip .sv { font-weight:600; color:#ccd5e8; }
        #ip .ds { margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.06); font-size:12px; line-height:1.6; color:#99aabb; }
        #ip .ft { margin-top:8px; padding:8px 12px; background:rgba(255,165,0,0.08); border-left:3px solid #ffa500; border-radius:4px; font-size:12px; line-height:1.5; color:#ddc; }

        #nv { position:fixed; top:16px; right:16px; display:flex; flex-direction:column; gap:5px; z-index:10; }
        .nb { background:rgba(8,12,24,0.85); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.08); color:#ccd5e8; padding:7px 14px; border-radius:9px; cursor:pointer; font-size:12px; transition:all 0.2s; text-align:left; min-width:110px; display:flex; align-items:center; gap:8px; }
        .nb:hover { background:rgba(255,165,0,0.1); border-color:rgba(255,165,0,0.25); }
        .nb.on { background:rgba(255,165,0,0.15); border-color:rgba(255,165,0,0.4); }
        .nd { width:9px; height:9px; border-radius:50%; flex-shrink:0; }

        #ct { position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:rgba(8,12,24,0.85); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:9px 18px; display:flex; align-items:center; gap:20px; z-index:10; }
        .cg { display:flex; align-items:center; gap:8px; font-size:12px; color:#7788aa; }
        #ss { width:100px; -webkit-appearance:none; appearance:none; height:3px; border-radius:2px; background:rgba(255,255,255,0.1); outline:none; }
        #ss::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:#ffa500; cursor:pointer; }
        #ss::-moz-range-thumb { width:13px; height:13px; border:none; border-radius:50%; background:#ffa500; cursor:pointer; }
        .tb { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); color:#8899bb; padding:5px 12px; border-radius:7px; cursor:pointer; font-size:11px; transition:all 0.2s; white-space:nowrap; }
        .tb:hover { color:#fff; border-color:rgba(255,255,255,0.2); }
        .tb.on { background:rgba(255,165,0,0.12); border-color:rgba(255,165,0,0.3); color:#ffa500; }
        .pl { color:rgba(255,255,255,0.55); font-size:10px; font-weight:500; letter-spacing:1px; text-transform:uppercase; pointer-events:none; text-shadow:0 0 6px rgba(0,0,0,0.9); position:absolute; white-space:nowrap; }
        #ht { position:fixed; bottom:65px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,0.2); font-size:11px; pointer-events:none; z-index:5; animation:hf 5s 2s forwards; }
        @keyframes hf { to { opacity:0; } }
        @media(max-width:768px) {
            #ip { max-width:calc(100vw - 32px); width:calc(100vw - 32px); top:auto; bottom:70px; left:16px; }
            .nb { min-width:auto; padding:5px 8px; font-size:10px; }
            #ct { flex-wrap:wrap; justify-content:center; gap:10px; padding:7px 12px; }
            #ss { width:70px; }
        }
    </style>
</head>
<body>
    <div id="ld"><div class="sp"></div><div class="tx" id="lt">LOADING</div><div class="pg"><div class="pb" id="lb"></div></div><div class="er" id="le"></div></div>
    <div id="c"></div>
    <div id="hd"><h1>Solar System</h1><p>Interactive 3D</p></div>
    <div id="nv"></div>
    <div id="ip"><div class="ph"><div class="cb" id="pc"></div><h2 id="pn"></h2><div class="st" id="pt"></div></div><div class="bd"><div id="ps"></div><div class="ds" id="pd"></div><div class="ft" id="pf"></div></div></div>
    <div id="ct"><div class="cg"><label>Speed</label><input type="range" id="ss" min="0" max="5" step="0.1" value="1"><span id="sv" style="min-width:28px;color:#ccd5e8;">1.0x</span></div><div class="cg"><button class="tb on" id="bo">Orbits</button><button class="tb on" id="bl">Labels</button><button class="tb" id="br">Overview</button></div></div>
    <div id="ht">Click a planet · Drag to rotate · Scroll to zoom</div>

    <script src="js/three.min.js"></script>
    <script src="js/OrbitControls.js"></script>
    <script>
    (function() {
        "use strict";

        // === Error display ===
        function ERR(msg) {
            console.error(msg);
            var lt = document.getElementById('lt');
            var le = document.getElementById('le');
            if (lt) lt.textContent = 'ERROR';
            if (le) { le.textContent = msg; le.style.display = 'block'; }
        }
        window.addEventListener('error', function(e) { ERR(e.message); });

        // === Check prerequisites ===
        if (typeof THREE === 'undefined') {
            ERR('3D engine failed to load. Please refresh the page.');
            return;
        }

        // Check WebGL support
        try {
            var testCanvas = document.createElement('canvas');
            var gl = testCanvas.getContext('webgl') || testCanvas.getContext('experimental-webgl');
            if (!gl) { ERR('Your device does not support WebGL. Try a different browser.'); return; }
        } catch(e) {
            ERR('WebGL check failed: ' + e.message);
            return;
        }

        var T = THREE; // shorthand

        // === Data ===
        var SUN = { name:'Sun', type:'G-type Star (G2V)', color:'#ffaa00',
            stats:{ 'Diameter':'1,392,700 km', 'Surface Temp':'5,500°C', 'Core Temp':'15M °C', 'Age':'4.6B years', 'Mass':'1.989×10^30 kg', 'Composition':'73% H, 25% He' },
            desc:'The star at the center of our Solar System. Contains 99.86% of the total mass and produces energy through nuclear fusion.',
            fact:'Over 1 million Earths could fit inside the Sun.' };

        var PL = [
            { n:'Mercury', t:'Terrestrial Planet', r:1.2, d:22, op:88, rp:1407.6, tl:0.034, c:'#a0826d', tx:'textures/mercury.jpg',
              s:{ 'Diameter':'4,879 km', 'Distance':'57.9M km', 'Orbit':'88 days', 'Day':'1,408 hours', 'Moons':'0', 'Temp':'-173 to 427°C' },
              de:'Smallest planet. No atmosphere, covered in craters. Extreme temperature variations.',
              f:'A day on Mercury lasts 176 Earth days — longer than its year!' },
            { n:'Venus', t:'Terrestrial Planet', r:2.6, d:34, op:225, rp:-5832, tl:3.096, c:'#e8b772', tx:'textures/venus.jpg',
              s:{ 'Diameter':'12,104 km', 'Distance':'108.2M km', 'Orbit':'225 days', 'Day':'5,832 hours', 'Moons':'0', 'Temp':'462°C' },
              de:'Hottest planet. Thick CO2 atmosphere creates runaway greenhouse effect. Surface pressure 92x Earth.',
              f:'Venus rotates backwards! Sun rises in the west.' },
            { n:'Earth', t:'Our Home', r:2.8, d:50, op:365, rp:24, tl:0.4091, c:'#4a90d9', tx:'textures/earth.jpg',
              s:{ 'Diameter':'12,742 km', 'Distance':'149.6M km', 'Orbit':'365.25 days', 'Day':'24 hours', 'Moons':'1 (Luna)', 'Temp':'-88 to 58°C' },
              de:'Only known planet with life. Liquid water oceans, protective atmosphere, magnetic field. 71% covered by water.',
              f:'Only planet not named after a Greek/Roman deity.' },
            { n:'Mars', t:'Terrestrial Planet', r:1.6, d:68, op:687, rp:24.7, tl:0.4396, c:'#c1502d', tx:'textures/mars.jpg',
              s:{ 'Diameter':'6,779 km', 'Distance':'227.9M km', 'Orbit':'687 days', 'Day':'24.7 hours', 'Moons':'2', 'Temp':'-153 to 20°C' },
              de:'The Red Planet. Iron oxide gives it red color. Has largest volcano (Olympus Mons) and deepest canyon.',
              f:'Olympus Mons is 3x taller than Mount Everest!' },
            { n:'Jupiter', t:'Gas Giant', r:7.5, d:105, op:4333, rp:9.9, tl:0.0546, c:'#c88b3a', tx:'textures/jupiter.jpg',
              s:{ 'Diameter':'139,820 km', 'Distance':'778.5M km', 'Orbit':'11.9 years', 'Day':'9.9 hours', 'Moons':'95', 'Temp':'-145°C' },
              de:'Largest planet — more massive than all others combined. Great Red Spot is a 350+ year storm.',
              f:'Great Red Spot is a storm larger than Earth.' },
            { n:'Saturn', t:'Gas Giant', r:6.2, d:145, op:10759, rp:10.7, tl:0.4665, c:'#d4b878', tx:'textures/saturn.jpg', rings:true,
              s:{ 'Diameter':'116,460 km', 'Distance':'1.43B km', 'Orbit':'29.5 years', 'Day':'10.7 hours', 'Moons':'146', 'Temp':'-178°C' },
              de:'Famous for spectacular rings made of billions of ice particles. Least dense planet.',
              f:'Saturn would float in water (if you had a big enough bathtub).' },
            { n:'Uranus', t:'Ice Giant', r:4.0, d:185, op:30687, rp:-17.2, tl:1.7064, c:'#9fdfdf', tx:'textures/uranus.jpg',
              s:{ 'Diameter':'50,724 km', 'Distance':'2.87B km', 'Orbit':'84 years', 'Day':'17.2 hours', 'Moons':'28', 'Temp':'-224°C' },
              de:'Pale cyan from methane. Rotates on its side at 98° tilt.',
              f:'Uranus rotates on its side — rolls around the Sun!' },
            { n:'Neptune', t:'Ice Giant', r:3.9, d:225, op:60190, rp:16.1, tl:0.4943, c:'#3060cc', tx:'textures/neptune.jpg',
              s:{ 'Diameter':'49,244 km', 'Distance':'4.50B km', 'Orbit':'165 years', 'Day':'16.1 hours', 'Moons':'16', 'Temp':'-214°C' },
              de:'Farthest planet. Fastest winds in solar system — up to 2,100 km/h.',
              f:'Strongest winds in the solar system.' }
        ];

        // === Detect device capability ===
        var isMobile = /Android|iPhone|iPad|iPod|Mobile|CriOS/i.test(navigator.userAgent) || innerWidth < 768;
        var maxTexSize = 2048;
        try {
            var _tc = document.createElement('canvas').getContext('webgl') || document.createElement('canvas').getContext('experimental-webgl');
            if (_tc) { var _md = _tc.getParameter(_tc.MAX_TEXTURE_SIZE); if (_md) maxTexSize = _md; }
        } catch(e) {}
        var useMobileTex = isMobile || maxTexSize < 4096;
        var TEXP = useMobileTex ? 'textures/m_' : 'textures/';

        // === Texture loading with progress ===
        var mgr = new T.LoadingManager();
        var loader = new T.TextureLoader(mgr);

        mgr.onProgress = function(url, loaded, total) {
            var pct = Math.round((loaded / total) * 100);
            var bar = document.getElementById('lb');
            var lt = document.getElementById('lt');
            if (bar) bar.style.width = pct + '%';
            if (lt) lt.textContent = 'LOADING ' + pct + '%';
        };
        mgr.onError = function(url) { console.warn('Texture failed:', url); };

        function loadTex(path) {
            try {
                var fullPath = path.replace('textures/', TEXP);
                var tex = loader.load(fullPath);
                if (tex.encoding !== undefined) tex.encoding = T.sRGBEncoding;
                tex.anisotropy = useMobileTex ? 4 : 8;
                return tex;
            } catch(e) { return null; }
        }

        // === Scene vars ===
        var scene, cam, rdr, ctrl;
        var sun, sunGlow, sunCorona;
        var bodies = [];
        var rc, mse;
        var focus = null, fState = 'none';
        var lastPos = new T.Vector3();
        var defaultPos = new T.Vector3(0, 100, 250);
        var speed = 1, showOrbits = true, showLabels = true;
        var clk = new T.Clock();
        var resetting = false;
        var labelBox;
        var tv = new T.Vector3();
        var hidden = false;

        function init() {
            scene = new T.Scene();
            cam = new T.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 5000);
            cam.position.copy(defaultPos);

            rdr = new T.WebGLRenderer({ antialias:true, powerPreference:'high-performance' });
            rdr.setSize(innerWidth, innerHeight);
            rdr.setPixelRatio(Math.min(devicePixelRatio, 2));
            rdr.toneMapping = T.ACESFilmicToneMapping;
            rdr.toneMappingExposure = 1.0;
            if (rdr.outputEncoding !== undefined) rdr.outputEncoding = T.sRGBEncoding;
            document.getElementById('c').appendChild(rdr.domElement);

            ctrl = new T.OrbitControls(cam, rdr.domElement);
            ctrl.enableDamping = true;
            ctrl.dampingFactor = 0.06;
            ctrl.minDistance = 2;
            ctrl.maxDistance = 1200;

            rc = new T.Raycaster();
            mse = new T.Vector2();

            scene.add(new T.AmbientLight(0x333344, 0.3));
            scene.add(new T.PointLight(0xffffff, 3.5, 2000, 0.4));

            makeStars();
            makeSun();
            makePlanets();
            makeLabels();
            makeNav();

            addEventListener('resize', onResize);
            rdr.domElement.addEventListener('click', onClick);
            setupControls();

            // Hide loading when textures done OR after 10s fallback
            mgr.onLoad = hideLoad;
            setTimeout(function() {
                if (!hidden) {
                    console.log('Loading timeout — showing scene anyway');
                    hideLoad();
                }
            }, 10000);

            animate();
        }

        function hideLoad() {
            if (hidden) return;
            hidden = true;
            var ld = document.getElementById('ld');
            ld.style.opacity = '0';
            setTimeout(function() { ld.style.display = 'none'; }, 1000);
        }

        // === Stars ===
        function makeStars() {
            var N = isMobile ? 3000 : 8000;
            var pos = new Float32Array(N*3), col = new Float32Array(N*3);
            for (var i=0; i<N; i++) {
                var r = 800 + Math.random()*600;
                var th = Math.random() * Math.PI * 2;
                var ph = Math.acos(2*Math.random() - 1);
                pos[i*3] = r*Math.sin(ph)*Math.cos(th);
                pos[i*3+1] = r*Math.cos(ph);
                pos[i*3+2] = r*Math.sin(ph)*Math.sin(th);
                var t = Math.random();
                var c = t<0.7?[1,1,1]:t<0.85?[0.8,0.85,1]:t<0.95?[1,0.9,0.7]:[1,0.7,0.5];
                col[i*3]=c[0]; col[i*3+1]=c[1]; col[i*3+2]=c[2];
            }
            var g = new T.BufferGeometry();
            g.setAttribute('position', new T.BufferAttribute(pos, 3));
            g.setAttribute('color', new T.BufferAttribute(col, 3));
            scene.add(new T.Points(g, new T.PointsMaterial({ size:1.5, vertexColors:true, transparent:true, opacity:0.9, blending:T.AdditiveBlending, depthWrite:false })));
        }

        // === Sun ===
        function makeSun() {
            var r = 12;
            var g = new T.SphereGeometry(r, 96, 72);
            var m = new T.MeshBasicMaterial({ map: loadTex('textures/sun.jpg') });
            sun = new T.Mesh(g, m);
            sun.userData = { click:true, sun:true, name:'Sun' };
            scene.add(sun);

            // Glow
            var cv = document.createElement('canvas');
            cv.width = 256; cv.height = 256;
            var cx = cv.getContext('2d');
            var gr = cx.createRadialGradient(128,128,10, 128,128,128);
            gr.addColorStop(0, 'rgba(255,200,80,0.8)');
            gr.addColorStop(0.3, 'rgba(255,160,40,0.3)');
            gr.addColorStop(1, 'rgba(255,80,0,0)');
            cx.fillStyle = gr; cx.fillRect(0,0,256,256);
            var gt = new T.CanvasTexture(cv);

            sunGlow = new T.Sprite(new T.SpriteMaterial({ map:gt, blending:T.AdditiveBlending, transparent:true, depthWrite:false }));
            sunGlow.scale.set(r*5, r*5, 1);
            scene.add(sunGlow);

            sunCorona = new T.Sprite(new T.SpriteMaterial({ map:gt, blending:T.AdditiveBlending, transparent:true, opacity:0.3, depthWrite:false }));
            sunCorona.scale.set(r*10, r*10, 1);
            scene.add(sunCorona);
        }

        // === Planets ===
        function makePlanets() {
            for (var i = 0; i < PL.length; i++) {
                (function(data) {
                    var grp = new T.Group();
                    data._a = Math.random() * Math.PI * 2;
                    var r = Math.max(0.3, data.r);

                    var segs = isMobile ? (r >= 5 ? 48 : 32) : (r >= 5 ? 96 : 64);
                    var geo = new T.SphereGeometry(r, segs, Math.floor(segs * 0.75));
                    var tex = loadTex(data.tx);
                    var mat = new T.MeshStandardMaterial({
                        map: tex || undefined,
                        roughness: 0.85, metalness: 0,
                        color: tex ? 0xffffff : data.c  // Fallback to solid color if texture fails
                    });
                    var mesh = new T.Mesh(geo, mat);
                    mesh.userData = { click:true, name:data.n, data:data };

                    var tilt = new T.Group();
                    tilt.rotation.z = data.tl;
                    tilt.add(mesh);
                    grp.add(tilt);

                    // Earth extras
                    if (data.n === 'Earth') {
                        var cTex = loadTex('textures/earth_clouds.jpg');
                        if (cTex) {
                            var cl = new T.Mesh(
                                new T.SphereGeometry(r*1.01, 64, 48),
                                new T.MeshStandardMaterial({ map:cTex, transparent:true, opacity:0.35, depthWrite:false })
                            );
                            mesh.add(cl);
                            data._cl = cl;
                        }

                        // Atmosphere
                        var ac = document.createElement('canvas');
                        ac.width = 128; ac.height = 64;
                        var ax = ac.getContext('2d');
                        var ag = ax.createRadialGradient(64,32,15, 64,32,64);
                        ag.addColorStop(0, 'rgba(100,180,255,0)');
                        ag.addColorStop(1, 'rgba(60,120,230,0.35)');
                        ax.fillStyle = ag; ax.fillRect(0,0,128,64);
                        var at = new T.CanvasTexture(ac);
                        mesh.add(new T.Mesh(
                            new T.SphereGeometry(r*1.08, 48, 36),
                            new T.MeshBasicMaterial({ map:at, transparent:true, blending:T.AdditiveBlending, depthWrite:false, side:T.BackSide })
                        ));

                        // Moon
                        var mTex = loadTex('textures/moon.jpg');
                        var mMat = new T.MeshStandardMaterial({ map: mTex, roughness:0.95, color: mTex ? 0xffffff : 0x999999 });
                        var moon = new T.Mesh(new T.SphereGeometry(0.5, 48, 36), mMat);
                        moon.position.x = r * 2.5;
                        var mg = new T.Group();
                        mg.add(moon);
                        grp.add(mg);
                        data._mg = mg;
                    }

                    // Saturn rings
                    if (data.rings) {
                        var inR = r*1.4, outR = r*2.5;
                        var rg = new T.RingGeometry(inR, outR, 96, 1);
                        var pa = rg.attributes.position, ua = rg.attributes.uv;
                        var v = new T.Vector3();
                        for (var vi = 0; vi < pa.count; vi++) {
                            v.fromBufferAttribute(pa, vi);
                            var dd = (v.length() - inR) / (outR - inR);
                            ua.setXY(vi, dd, 0.5);
                        }
                        var rTex = loader.load(TEXP + 'saturn_rings.png');
                        rTex.anisotropy = 8;
                        var rings = new T.Mesh(rg, new T.MeshBasicMaterial({ map:rTex, transparent:true, side:T.DoubleSide, depthWrite:false }));
                        rings.rotation.x = Math.PI / 2;
                        tilt.add(rings);
                    }

                    // Orbit line
                    var og = new T.BufferGeometry();
                    var pts = [];
                    for (var s = 0; s <= 200; s++) {
                        var a = (s/200) * Math.PI * 2;
                        pts.push(Math.cos(a)*data.d, 0, Math.sin(a)*data.d);
                    }
                    og.setAttribute('position', new T.Float32BufferAttribute(pts, 3));
                    var ol = new T.Line(og, new T.LineBasicMaterial({ color:0x445566, transparent:true, opacity:0.25 }));
                    scene.add(ol);

                    scene.add(grp);
                    bodies.push({ data:data, group:grp, mesh:mesh, orbit:ol });
                })(PL[i]);
            }
        }

        // === Labels ===
        function makeLabels() {
            labelBox = document.createElement('div');
            labelBox.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:5;overflow:hidden;';
            document.body.appendChild(labelBox);
            for (var i = 0; i < bodies.length; i++) {
                var el = document.createElement('div');
                el.className = 'pl';
                el.textContent = bodies[i].data.n;
                labelBox.appendChild(el);
                bodies[i].label = el;
            }
            var sl = document.createElement('div');
            sl.className = 'pl'; sl.textContent = 'Sun';
            sl.style.color = 'rgba(255,200,80,0.5)';
            labelBox.appendChild(sl);
            sun.userData.label = sl;
        }

        // === Nav ===
        function makeNav() {
            var nv = document.getElementById('nv');
            var all = [{n:'Sun',c:'#ffaa00'}].concat(PL.map(function(p){return{n:p.n,c:p.c};}));
            for (var i = 0; i < all.length; i++) {
                (function(p) {
                    var b = document.createElement('button');
                    b.className = 'nb';
                    b.innerHTML = '<span class="nd" style="background:'+p.c+'"></span>'+p.n;
                    b.onclick = function(){ focusOn(p.n); };
                    nv.appendChild(b);
                })(all[i]);
            }
        }

        // === Focus / Reset ===
        function focusOn(name) {
            resetting = false;
            if (name === 'Sun') { focus = {sun:true, name:'Sun'}; fState = 'flying'; showInfo(SUN, '#ffaa00'); navActive('Sun'); return; }
            for (var i = 0; i < bodies.length; i++) {
                if (bodies[i].data.n === name) { focus = bodies[i]; break; }
            }
            if (!focus) return;
            fState = 'flying';
            showInfo(focus.data, focus.data.c);
            navActive(name);
        }

        function resetView() {
            focus = null; fState = 'none'; resetting = true;
            document.getElementById('ip').classList.remove('on');
            navActive(null);
        }

        function navActive(name) {
            var btns = document.querySelectorAll('.nb');
            for (var i = 0; i < btns.length; i++) btns[i].classList.toggle('on', name && btns[i].textContent.indexOf(name) >= 0);
        }

        function showInfo(d, color) {
            var p = document.getElementById('ip');
            document.getElementById('pn').textContent = d.n || d.name;
            document.getElementById('pt').textContent = d.t || d.type;
            document.getElementById('pc').style.background = color;
            var se = document.getElementById('ps'); se.innerHTML = '';
            var stats = d.s || d.stats;
            if (stats) { for (var k in stats) { var row = document.createElement('div'); row.className = 'sr'; row.innerHTML = '<span class="sl">'+k+'</span><span class="sv">'+stats[k]+'</span>'; se.appendChild(row); } }
            document.getElementById('pd').textContent = d.de || d.desc || '';
            document.getElementById('pf').textContent = d.f || d.fact || '';
            p.classList.add('on');
        }

        // === Interaction ===
        function onClick(e) {
            mse.x = (e.clientX / innerWidth) * 2 - 1;
            mse.y = -(e.clientY / innerHeight) * 2 + 1;
            rc.setFromCamera(mse, cam);
            var items = [sun];
            for (var i = 0; i < bodies.length; i++) items.push(bodies[i].mesh);
            var hits = rc.intersectObjects(items, false);
            if (hits.length > 0) focusOn(hits[0].object.userData.name);
        }

        function setupControls() {
            var ss = document.getElementById('ss');
            var svl = document.getElementById('sv');
            ss.oninput = function(){ speed = parseFloat(ss.value); svl.textContent = speed.toFixed(1)+'x'; };
            document.getElementById('bo').onclick = function(){ showOrbits = !showOrbits; this.className = 'tb'+(showOrbits?' on':''); for(var i=0;i<bodies.length;i++) bodies[i].orbit.visible = showOrbits; };
            document.getElementById('bl').onclick = function(){ showLabels = !showLabels; this.className = 'tb'+(showLabels?' on':''); };
            document.getElementById('br').onclick = resetView;
            addEventListener('keydown', function(e){
                if (e.key === 'Escape') resetView();
                var n = parseInt(e.key);
                if (n >= 1 && n <= 8) focusOn(PL[n-1].n);
                if (e.key === '0') focusOn('Sun');
            });
        }

        function onResize() {
            cam.aspect = innerWidth / innerHeight;
            cam.updateProjectionMatrix();
            rdr.setSize(innerWidth, innerHeight);
        }

        function updateLabels() {
            if (!labelBox) return;
            var w = innerWidth, h = innerHeight;
            for (var i = 0; i < bodies.length; i++) {
                var b = bodies[i]; if (!b.label) continue;
                b.group.getWorldPosition(tv);
                tv.y += b.data.r + 2;
                var sp = tv.clone().project(cam);
                if (sp.z < 1 && showLabels) {
                    b.label.style.display = 'block';
                    b.label.style.left = ((sp.x*0.5+0.5)*w) + 'px';
                    b.label.style.top = ((-sp.y*0.5+0.5)*h) + 'px';
                    b.label.style.transform = 'translate(-50%,-50%)';
                    var dist = cam.position.distanceTo(b.group.getWorldPosition(tv));
                    b.label.style.opacity = Math.max(0.2, Math.min(0.7, 180/dist));
                } else b.label.style.display = 'none';
            }
        }

        // === Animation ===
        function animate() {
            requestAnimationFrame(animate);
            var dt = Math.min(clk.getDelta(), 0.1);
            var tm = clk.getElapsedTime();

            sun.rotation.y += 0.0008 * (speed > 0 ? 1 : 0);
            if (sunGlow) { var p = 1 + Math.sin(tm*0.8)*0.03; sunGlow.scale.set(60*p, 60*p, 1); }
            if (sunCorona) { var p2 = 1 + Math.sin(tm*0.5)*0.05; sunCorona.scale.set(120*p2, 120*p2, 1); }

            for (var i = 0; i < bodies.length; i++) {
                var b = bodies[i], d = b.data;
                var os = (2*Math.PI / d.op) * 30;
                d._a += os * dt * speed;
                b.group.position.x = Math.cos(d._a) * d.d;
                b.group.position.z = Math.sin(d._a) * d.d;
                var rs = (2*Math.PI / Math.abs(d.rp)) * 200;
                b.mesh.rotation.y += rs * dt * speed * Math.sign(d.rp);
                if (d._cl) d._cl.rotation.y += rs * dt * speed * 0.15;
                if (d._mg) d._mg.rotation.y += 0.5 * dt * speed;
            }

            // Camera follow
            if (fState === 'flying' || fState === 'following') {
                var tp = new T.Vector3(), tr = 12;
                if (focus) {
                    if (focus.sun) { tp.set(0,0,0); tr = 12; }
                    else { focus.group.getWorldPosition(tp); tr = focus.data.r; }

                    if (fState === 'flying') {
                        var off = tr * 4 + 8;
                        var dp = tp.clone();
                        dp.x += off*0.5; dp.y += off*0.4; dp.z += off;
                        cam.position.lerp(dp, 0.045);
                        ctrl.target.lerp(tp, 0.08);
                        if (cam.position.distanceTo(dp) < off*0.08) {
                            fState = 'following';
                            lastPos.copy(tp);
                        }
                    } else {
                        var dl = tp.clone().sub(lastPos);
                        cam.position.add(dl);
                        ctrl.target.add(dl);
                        lastPos.copy(tp);
                    }
                }
            }

            if (resetting) {
                cam.position.lerp(defaultPos, 0.03);
                ctrl.target.lerp(new T.Vector3(0,0,0), 0.03);
                if (cam.position.distanceTo(defaultPos) < 1) resetting = false;
            }

            ctrl.update();
            updateLabels();
            rdr.render(scene, cam);
        }

        // === GO ===
        try {
            init();
        } catch(err) {
            ERR(err.message || 'Failed to initialize');
        }

    })();
    </script>
</body>
</html>
